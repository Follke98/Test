<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial;
}

body{

height:100vh;

background: linear-gradient(135deg,#667eea,#764ba2);

display:flex;
justify-content:center;
align-items:center;

transition:.5s;

}

.dark{

background: linear-gradient(135deg,#141e30,#243b55);

}

.card{

background:white;

width:460px;

padding:40px;

border-radius:20px;

box-shadow:0 20px 60px rgba(0,0,0,0.3);

text-align:center;

animation:fade 1s;

}

.dark .card{

background:#1e1e1e;
color:white;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(40px);

}

}

.title{

font-size:28px;

margin-bottom:15px;

}

.text{

font-size:18px;

color:gray;

margin-bottom:25px;

line-height:28px;

}

.dark .text{

color:#ccc;

}

button{

border:none;

padding:12px 25px;

margin:10px;

border-radius:30px;

font-size:16px;

cursor:pointer;

transition:.3s;

}

.yes{

background:#ff4d6d;
color:white;

}

.no{

background:#ddd;

position:relative;

}

.yes:hover{

transform:scale(1.1);

background:#ff1e4d;

}

.no:hover{

background:#bbb;

}

.heart{

font-size:40px;

animation:beat 1s infinite;

}

@keyframes beat{

0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}

}

.toggle{

position:absolute;

top:20px;

right:20px;

background:black;

color:white;

padding:8px 15px;

border-radius:20px;

}

.result{

margin-top:20px;

font-size:20px;

color:#ff4d6d;

font-weight:bold;

}

.loading{

position:fixed;

width:100%;

height:100%;

background:black;

color:white;

display:flex;

justify-content:center;

align-items:center;

font-size:30px;

z-index:5;

animation:hide 2s forwards;

}

@keyframes hide{

80%{opacity:1;}
100%{

opacity:0;
visibility:hidden;

}

}

.fall{

position:fixed;

color:red;

animation:fall 4s linear infinite;

}

@keyframes fall{

0%{

transform:translateY(-100px);

}

100%{

transform:translateY(100vh);

}

}

</style>

</head>

<body>

<div class="loading">
Loading...
</div>

<button class="toggle" onclick="mode()">
Dark mode
</button>

<div class="card">

<div class="title">
เรามีอะไรจะบอก 😊
</div>

<div class="text">

ตั้งแต่ได้คุยกับเธอ<br>
เรานอนนนบ่อยขึ้นมากเลย

<br><br>

เราอาจไม่ใช่คนที่ดีที่สุด<br>
เเต่เรากินเก่งงงง
</div>

<div class="heart">
❤️
</div>

<div style="font-size:22px;">
ให้โอกาสเรานอนนนได้ไหม?
</div>

<button class="yes" onclick="yes()">
ได้
</button>

<button class="no" id="no">
ไม่ได้
</button>

<div class="result" id="result">

</div>

</div>

<script>

function mode(){

document.body.classList.toggle("dark");

}

function yes(){

document.getElementById("result").innerHTML=
"เย้ 🎉 เราจะไม่ทำให้เธอเสียใจแน่นอน";

confetti();

hearts();

}

var no=document.getElementById("no");

no.addEventListener("mouseover",function(){

no.style.position="absolute";

no.style.left=Math.random()*80+"%";

no.style.top=Math.random()*80+"%";

});

function hearts(){

for(i=0;i<20;i++){

var h=document.createElement("div");

h.innerHTML="❤️";

h.className="fall";

h.style.left=Math.random()*100+"%";

h.style.animationDuration=
(2+Math.random()*3)+"s";

document.body.appendChild(h);

}

}

function confetti(){

for(i=0;i<30;i++){

var c=document.createElement("div");

c.className="fall";

c.innerHTML="✨";

c.style.left=Math.random()*100+"%";

document.body.appendChild(c);

}

}

</script>
</body>
</html>
