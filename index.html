<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>For You</title>

<style>

body{

background: linear-gradient(270deg,#ff9a9e,#fad0c4,#ffd1ff);
background-size: 600% 600%;
animation: bgmove 10s infinite;

height: 100vh;
display: flex;
justify-content: center;
align-items: center;
font-family: Arial;

}

@keyframes bgmove{

0%{background-position:0%;}
50%{background-position:100%;}
100%{background-position:0%;}

}

.box{

background: white;
width: 420px;
padding: 40px;
border-radius: 20px;
box-shadow: 0 15px 40px rgba(0,0,0,0.2);
text-align: center;

animation: float 2s ease;

}

@keyframes float{

from{

opacity:0;
transform: translateY(50px);

}

to{

opacity:1;
transform: translateY(0);

}

}

h1{

color: #ff4d6d;
animation: textfade 2s;

}

@keyframes textfade{

from{opacity:0;}
to{opacity:1;}

}

p{

color: #555;
font-size: 18px;
animation: textfade 3s;

}

.button{

display: inline-block;
margin-top: 25px;
background: #ff4d6d;
color: white;
padding: 12px 30px;
border-radius: 30px;
text-decoration: none;

transition: 0.3s;

}

.button:hover{

background: #ff1e4d;
transform: scale(1.1);

}

.heart{

font-size: 35px;
color: red;

animation: beat 1s infinite;

}

@keyframes beat{

0%{transform: scale(1);}
50%{transform: scale(1.3);}
100%{transform: scale(1);}

}

.small{

margin-top:15px;
color:gray;
font-size:14px;

animation: textfade 4s;

}

</style>

</head>

<body>

<div class="box">

<h1>ถึงกันนนน 😊</h1>

<p>
ตั้งแต่ได้คุยกับเธอ<br>
วันธรรมดาก็กลายเป็นวันดีๆ
</p>

<p>
เราอาจไม่ได้เก่งเรื่องพูด<br>
แต่เราอยากบอกว่า...
</p>

<h2 style="color:#ff4d6d;">
ตั้งใจๆ
</h2>

<div class="heart">
❤️
</div>

<div class="small">
นอนบ่อยๆ
</div>

<a class="button">
อ่านข้อความนี้แล้วห้ามยิ้มนะ 😆
</a>

</div>

</body>
</html>
