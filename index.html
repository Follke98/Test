<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Something for you</title>

<style>

body{

background: linear-gradient(135deg,#ff9a9e,#fad0c4);
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
font-family: Arial;

}

.box{

background: white;
width: 420px;
padding: 40px;
border-radius: 20px;
box-shadow: 0 10px 30px rgba(0,0,0,0.2);
text-align: center;

animation: fade 1.5s;

}

@keyframes fade{

from{opacity:0; transform: translateY(20px);}
to{opacity:1;}

}

h1{

color: #ff4d6d;

}

p{

color: #555;
font-size: 18px;

}

.button{

display: inline-block;
margin-top: 20px;
background: #ff4d6d;
color: white;
padding: 12px 25px;
border-radius: 30px;
text-decoration: none;
transition: 0.3s;

}

.button:hover{

background: #ff1e4d;
transform: scale(1.05);

}

.heart{

font-size: 30px;
color: red;
animation: beat 1s infinite;

}

@keyframes beat{

0%{transform: scale(1);}
50%{transform: scale(1.2);}
100%{transform: scale(1);}

}

</style>

</head>

<body>

<div class="box">

<h1>ถึงจูน 😊</h1>

<p>
ตั้งแต่วันแรกที่ได้คุยกับเธอ<br>
มันทำให้วันธรรมดาของเราอยากนอน มากกกก
</p>

<p>
เราไม่รู้ว่าอนาคตจะเป็นยังไง<br>
แต่ตอนนี้เรารู้ว่า...
</p>

<h2 style="color:#ff4d6d;">
เราอยากนอน
</h2>

<div class="heart">
❤️
</div>

<a class="button">
ขอบคุณที่เข้ามาในชีวิตเรา
</a>

</div>

</body>
</html>
