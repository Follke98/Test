<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>เว็บง่ายๆ</title>

<style>
body{
    background: #f0f0f0;
    text-align: center;
    font-family: Arial;
}

.box{
    background: white;
    width: 300px;
    margin: 100px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
}

button{
    background: blue;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 5px;
}
</style>

</head>

<body>

<div class="box">

<h2>ทดสอบเว็บง่ายๆ</h2>

<input type="text" id="name" placeholder="ใส่ชื่อ">

<br><br>

<button onclick="showText()">
กดปุ่ม
</button>

<p id="result"></p>

</div>

<script>

function showText(){

var name = document.getElementById("name").value;

document.getElementById("result").innerHTML =
"สวัสดี " + name;

}

</script>

</body>
</html>
