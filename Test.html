<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ระบบลางาน</title>
</head>
<body>
  <h2>แบบฟอร์มลางาน</h2>

  <input id="name" placeholder="ชื่อ"><br><br>
  <input id="department" placeholder="แผนก"><br><br>

  <select id="leaveType">
    <option>ลาป่วย</option>
    <option>ลากิจ</option>
    <option>ลาพักร้อน</option>
  </select><br><br>

  <input type="date" id="startDate">
  <input type="date" id="endDate"><br><br>

  <textarea id="reason" placeholder="เหตุผล"></textarea><br><br>

  <button onclick="submitLeave()">ส่งคำขอลา</button>

  <script>
    function submitLeave() {
      fetch("https://script.google.com/macros/s/AKfycbzF_XVToREej-gEcU_UY2Xg2R5AgaKOr4y5i86rEv9GPpO2j-kOn207hRfYyvGUn-Q-/exec", {
        method: "POST",
        body: JSON.stringify({
          name: document.getElementById("name").value,
          department: document.getElementById("department").value,
          leaveType: document.getElementById("leaveType").value,
          startDate: document.getElementById("startDate").value,
          endDate: document.getElementById("endDate").value,
          reason: document.getElementById("reason").value
        })
      })
      .then(res => res.json())
      .then(() => alert("ส่งคำขอลาสำเร็จ"));
    }
  </script>
</body>
</html>
