<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>มีอะไรจะบอก</title>

<style>

body{
background: linear-gradient(to right, pink, #ffb6c1);
text-align: center;
font-family: Arial;
margin-top: 150px;
}

.box{
background: white;
width: 350px;
margin: auto;
padding: 30px;
border-radius: 15px;
box-shadow: 0px 0px 15px gray;
}

button{

background: #ff4d6d;
color: white;
border: none;
padding: 12px;
border-radius: 8px;
font-size: 16px;

}

button:hover{

background: #ff1e4d;

}

</style>

</head>

<body>

<div class="box">

<h2>เรามีอะไรจะบอก 😊</h2>

<p>กดปุ่มนี้ก่อน</p>

<button onclick="showMessage()">
กดตรงนี้
</button>

<p id="text"></p>

</div>

<script>

function showMessage(){

document.getElementById("text").innerHTML =
"เราชอบคุยกับเธอนะ เธอน่ารักดี 😊";

}

</script>

</body>

</html>
